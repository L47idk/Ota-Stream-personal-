name: otastream
description: A new Flutter project for OtaStream.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1 # For loading and caching media covers
  shimmer: ^3.0.0 # For loading indicators
  photo_view: ^0.14.0 # For Manga Reader zoom/pan

  # State Management (Riverpod for the Global Search Provider)
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # Networking & Scraping
  http: ^1.2.0 # Standard HTTP client
  dio: ^5.4.0 # Advanced HTTP client (often used for interceptors/proxies)
  html: ^0.15.4 # For parsing DOM elements (html_parser_helpers)
  beautiful_soup_dart: ^0.3.0 # For advanced CSS selectors dynamic scraper

  # Video Player (For animepahe chapters)
  video_player: ^2.8.2
  chewie: ^1.7.4 # Provides a nice UI wrapper for video_player

  # Local Storage & Database (For database_service / library / history)
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # Routing
  go_router: ^13.0.1 # Modern declarative routing (if using app_routes)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

dependencies:
  dio: ^5.4.1 # For downloading large files
  path_provider: ^2.1.2 # To find where to save files on the device
  permission_handler: ^11.3.1 # To ask for storage permission

  # Enable if you have local fonts
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #       weight: 700

  # Enable if you have local assets
  # assets:
  #   - assets/images/
